<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coco 的 AI 作品集</title>
  <style>
    :root {
      --neon-cyan: #00f5ff;
      --neon-purple: #bf00ff;
      --neon-pink: #ff006e;
      --neon-green: #00ff88;
      --card-bg: rgba(10, 10, 30, 0.75);
      --border-glow: rgba(0, 245, 255, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #050510;
      color: #e0e0ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #vanta-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 60px 0 40px;
    }

    .avatar-wrap {
      display: inline-block;
      margin-bottom: 24px;
      position: relative;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
      animation: spin 4s linear infinite;
      z-index: -1;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a0533, #001a33);
      border: 3px solid #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      position: relative;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hero-title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite, glitch 8s infinite;
      margin-bottom: 14px;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes glitch {
      0%, 90%, 100% { text-shadow: none; transform: none; }
      92% { text-shadow: 3px 0 var(--neon-pink), -3px 0 var(--neon-cyan); transform: skewX(2deg); }
      94% { text-shadow: -3px 0 var(--neon-pink), 3px 0 var(--neon-cyan); transform: skewX(-2deg); }
      96% { text-shadow: none; transform: none; }
    }

    .hero-sub {
      font-size: 1.1rem;
      color: rgba(200, 200, 255, 0.8);
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .contact-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .contact-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(0, 245, 255, 0.08);
      border: 1px solid rgba(0, 245, 255, 0.25);
      color: var(--neon-cyan);
      font-size: 0.88rem;
      text-decoration: none;
      transition: all 0.3s;
      backdrop-filter: blur(6px);
    }

    .contact-badge:hover {
      background: rgba(0, 245, 255, 0.18);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 16px rgba(0, 245, 255, 0.4);
      transform: translateY(-2px);
    }

    .contact-badge .icon { font-size: 1rem; }

    /* ── Section ── */
    .section {
      margin-top: 56px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(0,245,255,0.5), transparent);
    }

    .sub-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: rgba(191, 0, 255, 0.9);
      text-shadow: 0 0 8px rgba(191, 0, 255, 0.4);
      margin: 28px 0 16px;
      padding-left: 4px;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 24px 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(12px);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,245,255,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before { opacity: 1; }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--neon-cyan);
      box-shadow:
        0 0 20px rgba(0, 245, 255, 0.35),
        0 0 60px rgba(0, 245, 255, 0.12),
        0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .card.purple:hover {
      border-color: var(--neon-purple);
      box-shadow:
        0 0 20px rgba(191, 0, 255, 0.35),
        0 0 60px rgba(191, 0, 255, 0.12),
        0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .card.pink:hover {
      border-color: var(--neon-pink);
      box-shadow:
        0 0 20px rgba(255, 0, 110, 0.35),
        0 0 60px rgba(255, 0, 110, 0.12),
        0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .card.green:hover {
      border-color: var(--neon-green);
      box-shadow:
        0 0 20px rgba(0, 255, 136, 0.35),
        0 0 60px rgba(0, 255, 136, 0.12),
        0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .card-icon { font-size: 2.2rem; }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      color: #d0d0ff;
    }

    .card-tag {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.2);
      color: var(--neon-cyan);
    }

    .card.purple .card-tag {
      background: rgba(191, 0, 255, 0.1);
      border-color: rgba(191, 0, 255, 0.2);
      color: #d966ff;
    }

    .card.pink .card-tag {
      background: rgba(255, 0, 110, 0.1);
      border-color: rgba(255, 0, 110, 0.2);
      color: #ff6699;
    }

    .card.green .card-tag {
      background: rgba(0, 255, 136, 0.1);
      border-color: rgba(0, 255, 136, 0.2);
      color: var(--neon-green);
    }

    .card.disabled {
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .card.disabled .card-tag {
      background: rgba(150,150,150,0.1);
      border-color: rgba(150,150,150,0.2);
      color: #888;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 80px;
      color: rgba(150, 150, 200, 0.5);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .hero { padding: 40px 0 24px; }
    }
  </style>
</head>
<body>

<div id="vanta-bg"></div>

<!-- Three.js + Vanta.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
<script>
  VANTA.BIRDS({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.00,
    minWidth: 200.00,
    scale: 1.00,
    scaleMobile: 1.00,
    backgroundColor: 0x050510,
    color1: 0x00f5ff,
    color2: 0xbf00ff,
    colorMode: "lerp",
    birdSize: 1.2,
    wingSpan: 28.00,
    speedLimit: 4.00,
    separation: 60.00,
    alignment: 50.00,
    cohesion: 50.00,
    quantity: 3.00
  });
</script>

</body>
</html>
